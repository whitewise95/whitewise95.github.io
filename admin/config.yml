backend:
  name: github
  repo: whitewise95/whitewise95.github.io
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow
site_url: https://whitewise95.github.io
display_url: https://whitewise95.github.io

collections:
  - name: "posts"
    label: "포스트"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "제목", name: "title", widget: "string" }
      - { label: "발행일시", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss Z" }
      - label: "카테고리"
        name: "categories"
        widget: "list"
        default: ["spring-ai"]
        hint: "예: spring-ai, 스프링배치, Java"
      - { label: "고정 URL (선택)", name: "permalink", widget: "string", required: false }
      - { label: "본문", name: "body", widget: "markdown" }

  - name: "pages"
    label: "페이지"
    files:
      - label: "홈"
        name: "home"
        file: "index.md"
        fields:
          - { label: "Layout", name: "layout", widget: "string", default: "page" }
          - { label: "제목", name: "title", widget: "string", required: false }
          - { label: "본문", name: "body", widget: "markdown" }
      - label: "Java 카테고리"
        name: "java_page"
        file: "java.md"
        fields:
          - { label: "Layout", name: "layout", widget: "string", default: "page" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "permalink", name: "permalink", widget: "string" }
          - { label: "본문", name: "body", widget: "markdown" }
      - label: "Spring Batch 카테고리"
        name: "spring_batch_page"
        file: "spring-batch.md"
        fields:
          - { label: "Layout", name: "layout", widget: "string", default: "page" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "permalink", name: "permalink", widget: "string" }
          - { label: "본문", name: "body", widget: "markdown" }
      - label: "Spring AI 카테고리"
        name: "spring_ai_page"
        file: "spring-ai.md"
        fields:
          - { label: "Layout", name: "layout", widget: "string", default: "page" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "permalink", name: "permalink", widget: "string" }
          - { label: "본문", name: "body", widget: "markdown" }
