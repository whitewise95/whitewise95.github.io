name: Auto Java Version Posts

on:
  schedule:
    - cron: "0 15 * * *" # KST 00:00
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate next Java post
        id: generate
        run: ./scripts/generate_java_post.sh

      - name: Commit and push
        if: steps.generate.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          git commit -m "Add Java ${{ steps.generate.outputs.version }} post"
          git push

      - name: Disable this workflow after Java 21
        if: steps.generate.outputs.completed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-java-posts.yml'
            });
